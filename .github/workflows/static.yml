name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject Secrets into index.html
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          S_URL: ${{ secrets.SUPABASE_URL }}
          S_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_KEY }}
        run: |
          echo "Verifying Secrets (Checking presence only)..."
          if [ -z "${S_URL}" ]; then echo "WARNING: SUPABASE_URL secret is EMPTY!"; else echo "SUPABASE_URL found (Length: ${#S_URL})"; fi
          if [ -z "${S_KEY}" ]; then echo "WARNING: SUPABASE_KEY secret is EMPTY!"; else echo "SUPABASE_KEY found (Length: ${#S_KEY})"; fi
          
          # Write a temporary python script to do literal replacement safely
          cat << 'EOF' > inject_secrets.py
          import os
          import datetime
          
          def inject():
              with open('index.html', 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Literal replacement of placeholders
              # We use a unique 'INJECT' prefix to avoid collision with diagnostic strings
              s_url = os.environ.get('S_URL', '')
              s_key = os.environ.get('S_KEY', '')
              
              url_count = content.count('__INJECT_SUPABASE_URL__')
              key_count = content.count('__INJECT_SUPABASE_KEY__')
              
              content = content.replace('__INJECT_SUPABASE_URL__', s_url)
              content = content.replace('__INJECT_SUPABASE_KEY__', s_key)
              
              # Handle versioning
              msg = os.environ.get('COMMIT_MSG', '').replace('\n', ' ').replace('|', '').replace('"', '').replace('`', '')
              deploy_info = f"{datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')} - {msg}"
              content = content.replace('DEPLOY_VERSION_PLACEHOLDER', deploy_info)
              
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              
              print(f"Injection successful. Replaced {url_count} URL placeholders and {key_count} KEY placeholders.")
              if url_count == 0 or key_count == 0:
                  print("CRITICAL WARNING: One or more placeholders were NOT found in index.html!")

          if __name__ == "__main__":
              inject()
          EOF

          python3 inject_secrets.py
          rm inject_secrets.py
          echo "Injection step complete."
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
