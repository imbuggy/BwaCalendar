name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject Secrets into index.html
        run: |
          sed -i "s|'YOUR_SUPABASE_URL'|'${{ secrets.SUPABASE_URL }}'|g" index.html
          sed -i "s|'YOUR_SUPABASE_KEY'|'${{ secrets.SUPABASE_ANON_KEY }}'|g" index.html
          DEPLOY_INFO="$(date +'%Y-%m-%d %H:%M:%S') - ${{ github.event.head_commit.message }}"
          sed -i "s|DEPLOY_VERSION_PLACEHOLDER|${DEPLOY_INFO}|g" index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
