name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject Secrets into index.html
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          S_URL: ${{ secrets.SUPABASE_URL }}
          S_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_KEY }}
        run: |
          echo "Verifying Secrets (Checking presence only)..."
          if [ -z "${S_URL}" ]; then echo "WARNING: SUPABASE_URL secret is EMPTY!"; else echo "SUPABASE_URL found."; fi
          if [ -z "${S_KEY}" ]; then echo "WARNING: SUPABASE_KEY secret is EMPTY!"; else echo "SUPABASE_KEY found."; fi
          
          sed -i "s|__SUPABASE_URL__|${S_URL}|g" index.html
          sed -i "s|__SUPABASE_KEY__|${S_KEY}|g" index.html
          
          # Sanitize commit message to be single line and remove shell-sensitive chars
          CLEAN_MSG=$(echo "$COMMIT_MSG" | tr '\n' ' ' | sed 's/[|"`]//g')
          DEPLOY_INFO="$(date +'%Y-%m-%d %H:%M:%S') - $CLEAN_MSG"
          sed -i "s|DEPLOY_VERSION_PLACEHOLDER|${DEPLOY_INFO}|g" index.html
          
          echo "Injection complete."
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
